name: Build Docker Image 

on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "renv.lock"
  pull_request:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "renv.lock"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

    
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag duantianyu200/group-10-diabetes-prediction:latest

    - name: Push the Docker image
      run: docker push duantianyu200/group-10-diabetes-prediction:latest
